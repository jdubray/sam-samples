<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAM v2 — Stopwatch (VanJS)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 3rem auto; padding: 0 1rem; }
    .display { font-size: 3.5rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    button { font-size: 1rem; padding: .5rem 1rem; margin-right: .5rem; cursor: pointer; }
    ol { font-family: monospace; }
    .rejected { color: #b00020; font-family: monospace; font-size: .85rem; min-height: 1.2rem; }
  </style>
</head>
<body>
  <h1>Stopwatch</h1>
  <p><a href="https://vanjs.org">VanJS</a> renders from reactive states fed by SAM's render.
    Timestamps are computed in <em>actions</em> (the impure edge) so acceptors stay pure —
    the same discipline that keeps a v2 spec deterministic and replayable. Stopping a stopped
    watch or lapping a stopped one is <code>reject</code>ed, not ignored.</p>

  <div id="app"></div>

  <script src="../lib/SAM.js"></script>
  <!-- ESM import below is version-pinned; import statements cannot carry SRI -->
  <script type="module">
    import van from 'https://cdn.jsdelivr.net/npm/vanjs-core@1.5.5/src/van.js'

    const { createInstance } = tp
    const instance = createInstance({ strict: true, instanceName: 'stopwatch' })

    const display = van.state('0.0s')
    const running = van.state(false)
    const laps = van.state([])
    const rejection = van.state('')

    const fmt = ms => `${(ms / 1000).toFixed(1)}s`

    const { intents } = instance({
      initialState: {
        running: false, startedAt: 0, elapsed: 0, laps: []
      },

      component: {
        modelShape: {
          running: { type: 'boolean' },
          startedAt: { type: 'number' },
          elapsed: { type: 'number' },
          laps: { type: 'array' }
        },

        actions: {
          Start: { action: () => ({ now: Date.now() }), schema: { now: { type: 'number', required: true } } },
          Stop: { action: () => ({ now: Date.now() }), schema: { now: { type: 'number', required: true } } },
          Tick: { action: () => ({ now: Date.now() }), schema: { now: { type: 'number', required: true } } },
          Lap: { action: () => ({ now: Date.now() }), schema: { now: { type: 'number', required: true } } },
          Reset: () => ({ reset: true })
        },

        acceptors: {
          Start: model => ({ now }, { reject }) => {
            if (model.running) return reject('already running')
            model.running = true
            model.startedAt = now - model.elapsed
          },
          Stop: model => ({ now }, { reject }) => {
            if (!model.running) return reject('not running')
            model.running = false
            model.elapsed = now - model.startedAt
          },
          Tick: model => ({ now }, { reject }) => {
            if (!model.running) return reject('not running')
            model.elapsed = now - model.startedAt
          },
          Lap: model => ({ now }, { reject }) => {
            if (!model.running) return reject('cannot lap a stopped watch')
            model.laps = model.laps.concat(fmt(now - model.startedAt))
          },
          Reset: model => (proposal, { reject }) => {
            if (model.running) return reject('stop the watch first')
            model.elapsed = 0
            model.laps = []
          }
        }
      },

      stepListener: step => {
        rejection.val = step.classification === 'rejected'
          ? `rejected: ${step.rejections[0].reason}` : ''
      },

      render: state => {
        display.val = fmt(state.elapsed)
        running.val = state.running
        laps.val = state.laps
      }
    })

    setInterval(() => { if (running.val) intents.Tick() }, 100)

    const { div, button, ol, li } = van.tags
    van.add(document.getElementById('app'), div(
      div({ class: 'display' }, display),
      div(
        button({ onclick: () => intents.Start() }, 'Start'),
        button({ onclick: () => intents.Stop() }, 'Stop'),
        button({ onclick: () => intents.Lap() }, 'Lap'),
        button({ onclick: () => intents.Reset() }, 'Reset')
      ),
      div({ class: 'rejected' }, rejection),
      () => ol(laps.val.map(l => li(l)))
    ))
  </script>
</body>
</html>
