<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rocket Launcher — SAM + Inferno</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .mission-header {
      text-align: center;
    }
    .mission-header h1 {
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #58a6ff;
      margin-bottom: 4px;
    }
    .mission-header p {
      font-size: 0.7rem;
      color: #484f58;
      letter-spacing: 0.1em;
    }
    #representation {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 56px 80px;
      text-align: center;
      min-width: 340px;
      box-shadow: 0 0 60px rgba(88, 166, 255, 0.07);
    }
    #representation p {
      font-size: 3.2rem;
      font-weight: bold;
      color: #38bdf8;
      letter-spacing: 0.08em;
      margin-bottom: 40px;
      text-shadow: 0 0 32px rgba(56, 189, 248, 0.35);
    }
    #representation form {
      display: flex;
      justify-content: center;
    }
    .form-group { display: flex; justify-content: center; }
    #representation input[type=submit] {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      padding: 14px 48px;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.1s;
    }
    #representation input[type=submit]:active {
      transform: scale(0.97);
    }
    #representation input[value="Start"] {
      background: #238636;
      color: #fff;
    }
    #representation input[value="Start"]:hover {
      box-shadow: 0 0 24px rgba(35, 134, 54, 0.55);
    }
    #representation input[value="Abort"] {
      background: #da3633;
      color: #fff;
    }
    #representation input[value="Abort"]:hover {
      box-shadow: 0 0 24px rgba(218, 54, 51, 0.55);
    }
  </style>
</head>
<body>

<div class="mission-header">
  <h1>Mission Control — SAM + Inferno</h1>
  <p>rocket launch sequence</p>
</div>

<div id="representation"></div>

<script src="inferno.min.js"></script>
<script src="inferno-dom.min.js"></script>


<script type="text/javascript">

////////////////////////////////////////////////////////////////////////////////
// Model
//
const COUNTER_MAX = 10 ;

var model = {
        counter: COUNTER_MAX,
        started: false,
        launched: false,
        aborted: false} ;

model.present = function(data) {
    if (state.counting(model)) {
        if (model.counter === 0) {
            model.launched = data.launched || false ;
        } else {
            model.aborted = data.aborted || false ;
            if (data.counter !== undefined) { model.counter = data.counter ; }
        }
    } else {
        if (state.ready(model)) {
            model.started = data.started || false ;
        }
    }
    state.render(model) ;
}


////////////////////////////////////////////////////////////////////////////////
// View
//

var view = {} ;

// Initial State
view.init = function(model) {
    return view.ready(model) ;
}


view.counter = Inferno.createBlueprint({
                  tag: 'p',
                  children: {arg: 0}
              });



// State representation of the ready state
view.ready = function(model) {
    return {
          tag: 'div',
          children: [
              view.counter('Counter: '+model.counter),
              {
                tag: 'form',
                events: {
                      onsubmit: () => actions.start({})
                  },
                children: [
                    {
                        tag: 'div',
                        className: 'form-group',
                        children: [
                            {
                                tag: 'input',
                                attrs: {
                                    type: 'submit',
                                    value: 'Start'
                                }
                            }
                        ]
                    }
                ]
              }
          ]
      }
}

// State representation of the counting state
view.counting = function(model) {

  return {
          tag: 'div',
          children: [
              view.counter('Count down: '+model.counter),
              {
                tag: 'form',
                events: {
                      onsubmit: () => actions.abort({})
                  },
                children: [
                    {
                        tag: 'div',
                        className: 'form-group',
                        children: [
                            {
                                tag: 'input',
                                attrs: {
                                    type: 'submit',
                                    value: 'Abort'
                                }
                            }
                        ]
                    }
                ]
              }
          ]
      }

}

// State representation of the aborted state
view.aborted = function(model) {

  return {
          tag: 'div',
          children: [
              view.counter('Aborted at Counter: '+model.counter)
          ]
  }
}

// State representation of the launched state
view.launched = function(model) {

  return {
          tag: 'div',
          children: [
              view.counter('Launched')
          ]
  }
}

//display the state representation
view.display = function(representation) {
    //var stateRepresentation = document.getElementById("representation");
    InfernoDOM.render(representation, document.getElementById('representation')) ;
}

// Display initial state

view.display(view.init(model)) ;


////////////////////////////////////////////////////////////////////////////////
// State
//
var state =  { view: view} ;

model.state = state ;

// Derive the state representation as a function of the systen
// control state
state.representation = function(model) {
    var representation = 'oops... something went wrong, the system is in an invalid state' ;

    if (state.ready(model)) {
        representation = state.view.ready(model) ;
    }

    if (state.counting(model)) {
        representation = state.view.counting(model) ;
    }

    if (state.launched(model)) {
        representation = state.view.launched(model) ;
    }

    if (state.aborted(model)) {
        representation = state.view.aborted(model) ;
    }

    state.view.display(representation) ;
}

// Derive the current state of the system
state.ready = function(model) {
    return ((model.counter === COUNTER_MAX) && !model.started && !model.launched && !model.aborted) ;
}

state.counting = function(model) {
    var status = ((model.counter <= COUNTER_MAX) && (model.counter >= 0) && model.started && !model.launched && !model.aborted) ;
    return status ;
}

state.launched = function(model) {
    return ((model.counter == 0) && model.started && model.launched && !model.aborted) ;
}

state.aborted = function(model) {
    return (
        (  model.counter <= COUNTER_MAX) && (model.counter >= 0)
        && model.started && !model.launched && model.aborted ) ;
}


// Next action predicate, derives whether
// the system is in a (control) state where
// an action needs to be invoked

state.nextAction = function (model) {
    if (state.counting(model)) {
        if (model.counter>0) {
            actions.decrement({counter: model.counter},model.present) ;
        }

        if (model.counter === 0) {
            actions.launch({},model.present) ;
        }
    }
}

state.render = function(model) {
    state.representation(model)
    state.nextAction(model) ;
}


////////////////////////////////////////////////////////////////////////////////
// Actions
//

var actions = {} ;

actions.start = function(data, present) {
    present = present || model.present ;
    data.started = true ;
    present(data) ;
    return false ;
}

actions.decrement = function(data, present) {
    present = present || model.present ;
    data = data || {} ;
    data.counter = data.counter || 10 ;
    var d = data ;
    var p = present ;
    setTimeout(function() {
        d.counter = d.counter - 1 ;
        p(d) ;
    }, 1000) ;
}

actions.launch = function(data, present) {
    present = present || model.present ;
    data.launched = true ;
    present(data) ;
}

actions.abort = function(data, present) {
    present = present || model.present ;
    data.aborted = true ;
    present(data) ;
    return false ;
}

</script>
</body>
</html>
